name: DictlyMac
options:
  bundleIdPrefix: com.dictly
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  DictlyKit:
    path: ../DictlyKit

targets:
  DictlyMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
      - path: Settings
    resources:
      - path: Resources
    entitlements:
      path: Resources/DictlyMac.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.dictly.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dictly.mac
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Resources/DictlyMac.entitlements
    dependencies:
      - package: DictlyKit
        product: DictlyKit
